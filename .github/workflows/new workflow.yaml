name: CI Build and Push

on:
  push:
    branches:
      - main
      - 'feature/**'

  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: gists-api

jobs:

  test-build-scan:
    name: Test, Build and Security Scan
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      image_uri: ${{ steps.vars.outputs.image_uri }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 pip-audit

      - name: Run lint
        run: |
          flake8 .

      - name: Run unit tests
        run: |
          PYTHONPATH=. pytest

      - name: Run dependency vulnerability scan
        run: |
          pip-audit

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CI }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image variables
        id: vars
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          else
            IMAGE_URI=${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          fi

          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.vars.outputs.image_uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image using Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.vars.outputs.image_uri }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

  push-to-ecr:
    name: Push Docker Image to ECR
    runs-on: ubuntu-latest

    needs:
      - test-build-scan

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CI }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.test-build-scan.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max






name: Deploy ECS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: deployment
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

  ECR_REGISTRY: 851563870286.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: gists-api

  DEV_ECS_CLUSTER: gists-cluster-dev
  DEV_ECS_SERVICE: gists-api-service-dev

  PROD_ECS_CLUSTER: gists-cluster-prod
  PROD_ECS_SERVICE: gists-api-service-prod

  DEV_TASK_DEFINITION: ecs-task-definition-dev.json
  PROD_TASK_DEFINITION: ecs-task-definition-prod.json

jobs:

  deploy-dev:
    name: Deploy DEV
    runs-on: ubuntu-latest

    environment:
      name: development

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set image URI
        id: image
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.event.inputs.image_tag }}
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Render DEV task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.DEV_TASK_DEFINITION }}
          container-name: gists-api
          image: ${{ steps.image.outputs.image_uri }}

      - name: Deploy to ECS DEV
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.DEV_ECS_SERVICE }}
          cluster: ${{ env.DEV_ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: DEV smoke test
        run: |
          curl -f https://dev-api.yourdomain.com/health

  deploy-prod:
    name: Deploy PROD
    runs-on: ubuntu-latest

    needs:
      - deploy-dev

    environment:
      name: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render PROD task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.PROD_TASK_DEFINITION }}
          container-name: gists-api
          image: ${{ needs.deploy-dev.outputs.image_uri }}

      - name: Deploy to ECS PROD
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.PROD_ECS_SERVICE }}
          cluster: ${{ env.PROD_ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: PROD smoke test
        run: |
          curl -f https://api.yourdomain.com/health
